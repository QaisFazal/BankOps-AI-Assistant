services:
  backend:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install -e '.[dev]' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir backend"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/workspace

  frontend:
    image: python:3.12-slim
    working_dir: /workspace
    command: >
      sh -c "pip install -e '.[dev]' &&
             streamlit run frontend/streamlit_app.py --server.address 0.0.0.0"
    environment:
      BACKEND_URL: http://backend:8000/chat
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - .:/workspace
